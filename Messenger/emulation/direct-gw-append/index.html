<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Direct GW Append — Simulation</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #080b12;
      color: #e0e0e0;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    h1 {
      text-align: center;
      padding: 10px 18px;
      font-size: 15px;
      letter-spacing: 3px;
      color: #8899cc;
      border-bottom: 1px solid #1e2a44;
      flex-shrink: 0;
      background: linear-gradient(180deg, #0d1220 0%, #080b12 100%);
      text-transform: uppercase;
    }

    #canvas-wrap {
      flex: 1;
      position: relative;
      overflow: hidden;
      min-height: 0;
    }

    svg#diagram {
      width: 100%;
      height: 100%;
    }

    /* ── controls bar ─────────────────────────────────────────────── */
    #controls {
      padding: 8px 16px;
      border-top: 1px solid #1e2a44;
      display: flex;
      gap: 8px;
      align-items: center;
      flex-shrink: 0;
      background: #0a0e18;
    }

    button {
      background: linear-gradient(180deg, #1a2240 0%, #111830 100%);
      border: 1px solid #2a3a64;
      color: #99aadd;
      padding: 5px 14px;
      cursor: pointer;
      font-family: inherit;
      font-size: 11px;
      border-radius: 4px;
      transition: all 0.15s;
      letter-spacing: 1px;
    }
    button:hover  { background: linear-gradient(180deg, #2a3a60 0%, #1a2848 100%); color: #ccd8ff; border-color: #4455aa; }
    button:active { background: #1a2240; }
    button:disabled { opacity: 0.3; cursor: default; }

    #speed-label {
      color: #556688;
      font-size: 11px;
      display: flex;
      align-items: center;
      gap: 6px;
      letter-spacing: 1px;
    }
    input[type=range] {
      width: 80px;
      accent-color: #5577cc;
    }
    #step-label {
      color: #445577;
      font-size: 11px;
      margin-left: auto;
      letter-spacing: 1px;
    }

    /* ── animations ───────────────────────────────────────────────── */
    .pulse {
      animation: pulse-anim 0.55s ease-out;
    }
    @keyframes pulse-anim {
      0%   { filter: drop-shadow(0 0 0px #6699ff); }
      45%  { filter: drop-shadow(0 0 12px #6699ff) drop-shadow(0 0 4px #aabbff); }
      100% { filter: drop-shadow(0 0 0px #6699ff); }
    }
    .pulse-green {
      animation: pulse-green-anim 0.55s ease-out;
    }
    @keyframes pulse-green-anim {
      0%   { filter: drop-shadow(0 0 0px #44cc88); }
      45%  { filter: drop-shadow(0 0 12px #44cc88) drop-shadow(0 0 4px #88ffcc); }
      100% { filter: drop-shadow(0 0 0px #44cc88); }
    }
  </style>
</head>
<body>

<h1>Direct GW Append &mdash; Messenger Simulation</h1>

<div id="canvas-wrap">
  <svg id="diagram" viewBox="0 0 820 490" preserveAspectRatio="xMidYMid meet"></svg>
</div>

<div id="controls">
  <button id="btn-run">&#9654;&nbsp;Run</button>
  <button id="btn-step" disabled>Step</button>
  <button id="btn-reset">Reset</button>
  <label id="speed-label">
    Speed
    <input type="range" id="speed" min="100" max="2000" step="100" value="700" />
  </label>
  <span id="step-label">—</span>
</div>

<script>
/* ================================================================
   CONFIG
   ================================================================ */
const CONFIG = {
  NUM_CHATS:            3,
  USERS_PER_CHAT:       4,
  NUM_GATEWAY_NODES:    4,
  NUM_CHAT_USER_SHARDS: 3,
  NUM_USER_GW_SHARDS:   4,
};

/* ================================================================
   MD5 shard helper
   ================================================================ */
function md5(str) {
  function safeAdd(x,y){const l=(x&0xffff)+(y&0xffff);return(((x>>16)+(y>>16)+(l>>16))<<16)|(l&0xffff);}
  function rol(n,c){return(n<<c)|(n>>>(32-c));}
  function cmn(q,a,b,x,s,t){return safeAdd(rol(safeAdd(safeAdd(a,q),safeAdd(x,t)),s),b);}
  function ff(a,b,c,d,x,s,t){return cmn((b&c)|((~b)&d),a,b,x,s,t);}
  function gg(a,b,c,d,x,s,t){return cmn((b&d)|(c&(~d)),a,b,x,s,t);}
  function hh(a,b,c,d,x,s,t){return cmn(b^c^d,a,b,x,s,t);}
  function ii(a,b,c,d,x,s,t){return cmn(c^(b|(~d)),a,b,x,s,t);}
  const bytes=new TextEncoder().encode(str),l8=bytes.length;
  const l32=Math.ceil((l8+9)/64)*16,M=new Int32Array(l32);
  for(let i=0;i<l8;i++)M[i>>2]|=bytes[i]<<((i%4)*8);
  M[l8>>2]|=0x80<<((l8%4)*8);M[l32-2]=l8*8;
  let [a,b,c,d]=[1732584193,-271733879,-1732584194,271733878];
  for(let i=0;i<l32;i+=16){
    const[aa,bb,cc,dd]=[a,b,c,d];
    a=ff(a,b,c,d,M[i],7,-680876936);d=ff(d,a,b,c,M[i+1],12,-389564586);c=ff(c,d,a,b,M[i+2],17,606105819);b=ff(b,c,d,a,M[i+3],22,-1044525330);
    a=ff(a,b,c,d,M[i+4],7,-176418897);d=ff(d,a,b,c,M[i+5],12,1200080426);c=ff(c,d,a,b,M[i+6],17,-1473231341);b=ff(b,c,d,a,M[i+7],22,-45705983);
    a=ff(a,b,c,d,M[i+8],7,1770035416);d=ff(d,a,b,c,M[i+9],12,-1958414417);c=ff(c,d,a,b,M[i+10],17,-42063);b=ff(b,c,d,a,M[i+11],22,-1990404162);
    a=ff(a,b,c,d,M[i+12],7,1804603682);d=ff(d,a,b,c,M[i+13],12,-40341101);c=ff(c,d,a,b,M[i+14],17,-1502002290);b=ff(b,c,d,a,M[i+15],22,1236535329);
    a=gg(a,b,c,d,M[i+1],5,-165796510);d=gg(d,a,b,c,M[i+6],9,-1069501632);c=gg(c,d,a,b,M[i+11],14,643717713);b=gg(b,c,d,a,M[i],20,-373897302);
    a=gg(a,b,c,d,M[i+5],5,-701558691);d=gg(d,a,b,c,M[i+10],9,38016083);c=gg(c,d,a,b,M[i+15],14,-660478335);b=gg(b,c,d,a,M[i+4],20,-405537848);
    a=gg(a,b,c,d,M[i+9],5,568446438);d=gg(d,a,b,c,M[i+14],9,-1019803690);c=gg(c,d,a,b,M[i+3],14,-187363961);b=gg(b,c,d,a,M[i+8],20,1163531501);
    a=gg(a,b,c,d,M[i+13],5,-1444681467);d=gg(d,a,b,c,M[i+2],9,-51403784);c=gg(c,d,a,b,M[i+7],14,1735328473);b=gg(b,c,d,a,M[i+12],20,-1926607734);
    a=hh(a,b,c,d,M[i+5],4,-378558);d=hh(d,a,b,c,M[i+8],11,-2022574463);c=hh(c,d,a,b,M[i+11],16,1839030562);b=hh(b,c,d,a,M[i+14],23,-35309556);
    a=hh(a,b,c,d,M[i+1],4,-1530992060);d=hh(d,a,b,c,M[i+4],11,1272893353);c=hh(c,d,a,b,M[i+7],16,-155497632);b=hh(b,c,d,a,M[i+10],23,-1094730640);
    a=hh(a,b,c,d,M[i+13],4,681279174);d=hh(d,a,b,c,M[i],11,-358537222);c=hh(c,d,a,b,M[i+3],16,-722521979);b=hh(b,c,d,a,M[i+6],23,76029189);
    a=hh(a,b,c,d,M[i+9],4,-640364487);d=hh(d,a,b,c,M[i+12],11,-421815835);c=hh(c,d,a,b,M[i+15],16,530742520);b=hh(b,c,d,a,M[i+2],23,-995338651);
    a=ii(a,b,c,d,M[i],6,-198630844);d=ii(d,a,b,c,M[i+7],10,1126891415);c=ii(c,d,a,b,M[i+14],15,-1416354905);b=ii(b,c,d,a,M[i+5],21,-57434055);
    a=ii(a,b,c,d,M[i+12],6,1700485571);d=ii(d,a,b,c,M[i+3],10,-1894986606);c=ii(c,d,a,b,M[i+10],15,-1051523);b=ii(b,c,d,a,M[i+1],21,-2054922799);
    a=ii(a,b,c,d,M[i+8],6,1873313359);d=ii(d,a,b,c,M[i+15],10,-30611744);c=ii(c,d,a,b,M[i+6],15,-1560198380);b=ii(b,c,d,a,M[i+13],21,1309151649);
    a=ii(a,b,c,d,M[i+4],6,-145523070);d=ii(d,a,b,c,M[i+11],10,-1120210379);c=ii(c,d,a,b,M[i+2],15,718787259);b=ii(b,c,d,a,M[i+9],21,-343485551);
    a=safeAdd(a,aa);b=safeAdd(b,bb);c=safeAdd(c,cc);d=safeAdd(d,dd);
  }
  function w2h(n){return('0'.repeat(8)+(n>>>0).toString(16)).slice(-8).replace(/../g,x=>x[1]+x[0]).replace(/../g,x=>x[1]+x[0]);}
  return[w2h(a),w2h(b),w2h(c),w2h(d)].join('');
}
function shard(key,n){return Number(BigInt('0x'+md5(key))%BigInt(n));}

/* ================================================================
   WORLD
   ================================================================ */
function buildWorld() {
  const {NUM_CHATS,USERS_PER_CHAT,NUM_GATEWAY_NODES,NUM_CHAT_USER_SHARDS,NUM_USER_GW_SHARDS} = CONFIG;
  const chatUserShards = Array.from({length:NUM_CHAT_USER_SHARDS},()=>({}));
  const userGWShards   = Array.from({length:NUM_USER_GW_SHARDS},  ()=>({}));

  const addUserToChat = (cid,uid) => { const s=shard(cid,NUM_CHAT_USER_SHARDS); if(!chatUserShards[s][cid])chatUserShards[s][cid]=[]; if(!chatUserShards[s][cid].includes(uid))chatUserShards[s][cid].push(uid); };
  const setGW        = (uid,gw)  => { userGWShards[shard(uid,NUM_USER_GW_SHARDS)][uid]=gw; };
  const getUsers     = (cid)     => chatUserShards[shard(cid,NUM_CHAT_USER_SHARDS)][cid]||[];
  const getGW        = (uid)     => userGWShards[shard(uid,NUM_USER_GW_SHARDS)][uid]||null;

  const gwIds = Array.from({length:NUM_GATEWAY_NODES},(_,i)=>`GW${i+1}`);
  const gwNodes = {}; gwIds.forEach(id=>{gwNodes[id]={userSocket:{},chatUsers:{}};});
  const connectUser = (gwId,uid,sock,cids) => {
    gwNodes[gwId].userSocket[uid]=sock;
    cids.forEach(cid=>{if(!gwNodes[gwId].chatUsers[cid])gwNodes[gwId].chatUsers[cid]=[]; if(!gwNodes[gwId].chatUsers[cid].includes(uid))gwNodes[gwId].chatUsers[cid].push(uid);});
  };

  const users={}, chats={};
  let sockCtr=1, userCtr=1;
  for(let ci=0;ci<NUM_CHATS;ci++){
    const cid=`chat${ci+1}`; chats[cid]=[];
    for(let ui=0;ui<USERS_PER_CHAT;ui++){
      const uid=`u${userCtr}`, gwId=gwIds[(userCtr-1)%NUM_GATEWAY_NODES], sock=`s${sockCtr}`;
      userCtr++; sockCtr++;
      users[uid]={gwId,socketId:sock,delivered:0};
      addUserToChat(cid,uid); setGW(uid,gwId); connectUser(gwId,uid,sock,[cid]); chats[cid].push(uid);
    }
  }
  return {users,chats,gwNodes,getUsers,getGW,chatUserShards,userGWShards};
}

/* ================================================================
   STEPS
   ================================================================ */
function* makeSteps(world) {
  const {users,chats,gwNodes,getUsers,getGW} = world;
  const messages=[];
  for(const [cid,uids] of Object.entries(chats)){
    messages.push({chatId:cid,text:'Hello everyone!',sender:uids[0]});
    messages.push({chatId:cid,text:'How are you?',   sender:uids[1]});
  }
  for(let mi=0;mi<messages.length;mi++){
    const {chatId,text,sender}=messages[mi];
    yield {type:'msg-start',chatId,text,sender,msgIdx:mi,total:messages.length};

    // ① query chat-user storage
    const chatUsers=getUsers(chatId);
    yield {type:'query-chat-user',chatId,users:chatUsers};

    // ② scatter-gather: all user-gw queries at once
    const userGWPairs=chatUsers.map(uid=>({userId:uid,gwId:getGW(uid)}));
    yield {type:'query-user-gw-batch',chatId,userGWPairs};

    // ③ group by GW
    const gwGroups={};
    for(const {userId,gwId} of userGWPairs){
      if(!gwId) continue;
      if(!gwGroups[gwId]) gwGroups[gwId]=[];
      gwGroups[gwId].push(userId);
    }

    // ④ fanout to all GWs simultaneously
    const gwTargets=Object.entries(gwGroups).map(([gwId,uids])=>({gwId,uids}));
    yield {type:'route-to-gw-batch',chatId,gwTargets,text};

    // ⑤ fanout deliver: all GWs push to their users simultaneously
    const allDelivers=[];
    for(const {gwId} of gwTargets){
      const localUsers=gwNodes[gwId].chatUsers[chatId]||[];
      for(const uid of localUsers){
        allDelivers.push({gwId, userId:uid, socketId:gwNodes[gwId].userSocket[uid]});
      }
    }
    yield {type:'deliver-batch', chatId, delivers:allDelivers, text};
  }
  yield {type:'done'};
}

/* ================================================================
   LAYOUT CONSTANTS
   ================================================================ */
// viewBox: 820 × 490
const API_Y   = 68;
const STOR_X  = 740;
const GW_Y    = 355;
const USER_Y  = 450;

const CHAT_API_X = [168, 400, 632];   // 3 chat APIs

// All 4 GWs on the same row — spread across left side, storage on right
const GW_POS = {
  GW1: { x:  80, y: GW_Y },
  GW2: { x: 235, y: GW_Y },
  GW3: { x: 393, y: GW_Y },
  GW4: { x: 551, y: GW_Y },
};

// user X: chat baseX + index * 52
function chatBaseX(chatIdx) { return 65 + chatIdx * 216; }
function userPos(userId, users, chats) {
  for (const [chatId, uids] of Object.entries(chats)) {
    const idx = uids.indexOf(userId);
    if (idx === -1) continue;
    const ci = parseInt(chatId.replace('chat','')) - 1;
    return { x: chatBaseX(ci) + idx * 52, y: USER_Y };
  }
  return {x:0, y:0};
}

/* ================================================================
   DIAGRAM
   ================================================================ */
function buildDiagram(world) {
  const svg = document.getElementById('diagram');
  svg.innerHTML = '';
  const {users, chats, gwNodes} = world;

  /* ── defs: gradients + filters ─────────────────────────────── */
  const defs = svgEl('defs');
  svg.appendChild(defs);

  // arrow marker
  const mk = svgEl('marker', {id:'arrow', markerWidth:7, markerHeight:7, refX:5, refY:3, orient:'auto'});
  mk.appendChild(svgEl('path', {d:'M0,0.5 L0,5.5 L7,3 z', fill:'#2a3a5a'}));
  defs.appendChild(mk);

  // arrow marker bright (for active animations)
  const mkB = svgEl('marker', {id:'arrow-bright', markerWidth:7, markerHeight:7, refX:5, refY:3, orient:'auto'});
  mkB.appendChild(svgEl('path', {d:'M0,0.5 L0,5.5 L7,3 z', fill:'#5577cc'}));
  defs.appendChild(mkB);

  // glow filter
  const flt = svgEl('filter', {id:'glow', x:'-20%', y:'-20%', width:'140%', height:'140%'});
  const fe1 = svgEl('feGaussianBlur', {in:'SourceGraphic', stdDeviation:'2', result:'blur'});
  const fe2 = svgEl('feMerge');
  fe2.appendChild(svgEl('feMergeNode', {in:'blur'}));
  fe2.appendChild(svgEl('feMergeNode', {in:'SourceGraphic'}));
  flt.appendChild(fe1); flt.appendChild(fe2); defs.appendChild(flt);

  // node gradients
  addGrad(defs, 'grad-api',  '#1e2860', '#0e153a');
  addGrad(defs, 'grad-stor-amber', '#2e1a00', '#180d00');
  addGrad(defs, 'grad-stor-green', '#0a2210', '#051208');
  addGrad(defs, 'grad-gw',   '#0a2216', '#040f0a');
  addGrad(defs, 'grad-user', '#14182a', '#0a0d1a');

  /* ── edge layer ─────────────────────────────────────────────── */
  const edgeLayer = svgEl('g', {id:'edges', opacity:'0.55'});
  svg.appendChild(edgeLayer);

  const gwList = Object.keys(GW_POS);

  // ChatAPIs → storages
  CHAT_API_X.forEach(ax => {
    drawCurve(edgeLayer, ax, API_Y+18, STOR_X, 215, '#1a2844');
    drawCurve(edgeLayer, ax, API_Y+18, STOR_X, 322, '#1a2844');
  });

  // ChatAPIs → GWs
  CHAT_API_X.forEach(ax => {
    gwList.forEach(gwId => {
      const gp = GW_POS[gwId];
      drawCurve(edgeLayer, ax, API_Y+18, gp.x, gp.y-20, '#1a2844');
    });
  });

  // GWs → users
  for (const [gwId, gw] of Object.entries(gwNodes)) {
    const gp = GW_POS[gwId];
    for (const uid of Object.keys(gw.userSocket)) {
      const up = userPos(uid, users, chats);
      drawCurve(edgeLayer, gp.x, gp.y+20, up.x, up.y-14, '#111a2a');
    }
  }

  /* ── node layer ─────────────────────────────────────────────── */
  const nodeLayer = svgEl('g', {id:'nodes'});
  svg.appendChild(nodeLayer);

  // Chat API nodes
  const chatIds = Object.keys(chats);
  CHAT_API_X.forEach((ax, i) => {
    const cid = chatIds[i];
    const g = svgEl('g', {id:`node-api-${cid}`});
    g.appendChild(svgEl('rect', {x:ax-56, y:API_Y-18, width:112, height:36, rx:7,
      fill:'url(#grad-api)', stroke:'#3a50cc', 'stroke-width':1.2}));
    g.appendChild(svgText(ax, API_Y-3, `Chat${i+1} API`, 11, '#8899ee'));
    nodeLayer.appendChild(g);
  });

  // Storage nodes
  drawStorage(nodeLayer, STOR_X, 215, 'chat-user-storage', 'chat-user\nstorage', 'url(#grad-stor-amber)', '#c87820');
  drawStorage(nodeLayer, STOR_X, 322, 'user-gw-storage',   'user-gw\nstorage',   'url(#grad-stor-green)', '#3ea844');

  // GW nodes — all on same row
  gwList.forEach(gwId => {
    const gp = GW_POS[gwId];
    const g  = svgEl('g', {id:`node-${gwId}`});
    g.appendChild(svgEl('rect', {x:gp.x-52, y:gp.y-20, width:104, height:40, rx:7,
      fill:'url(#grad-gw)', stroke:'#1e7a44', 'stroke-width':1.2}));
    g.appendChild(svgText(gp.x, gp.y-6, gwId, 12, '#44cc77'));
    const uList = Object.keys(gwNodes[gwId].userSocket).join(' ');
    g.appendChild(svgText(gp.x, gp.y+9, uList, 8, '#2a6636'));
    nodeLayer.appendChild(g);
  });

  // GW row label
  nodeLayer.appendChild(svgText(GW_POS.GW4.x + 100, GW_Y, 'GATEWAY NODES', 8, '#1a3a28'));

  // User nodes
  for (const [uid, ud] of Object.entries(users)) {
    const up = userPos(uid, users, chats);
    const g  = svgEl('g', {id:`node-user-${uid}`});
    g.appendChild(svgEl('rect', {x:up.x-22, y:up.y-14, width:44, height:28, rx:5,
      fill:'url(#grad-user)', stroke:'#2a2f50', 'stroke-width':1}));
    g.appendChild(svgText(up.x, up.y-3, uid, 10, '#8899bb'));
    g.appendChild(svgText(up.x, up.y+9, ud.socketId, 8, '#3a4466'));
    nodeLayer.appendChild(g);
  }

  // Chat group borders
  const chatBoxes = svgEl('g', {id:'chat-labels'});
  chatIds.forEach((cid, i) => {
    const bx  = chatBaseX(i);
    const n   = chats[cid].length;
    const pad = 9;
    const rx  = bx - 22 - pad;
    const rw  = (n-1)*52 + 44 + pad*2;
    const ry  = USER_Y - 14 - pad;
    const rh  = 28 + pad*2;
    chatBoxes.appendChild(svgEl('rect', {x:rx, y:ry, width:rw, height:rh, rx:7,
      fill:'none', stroke:'#882010', 'stroke-width':1.2, 'stroke-dasharray':'5 3'}));
    chatBoxes.appendChild(svgText(rx + rw/2, ry-9, cid.toUpperCase(), 9, '#883322'));
  });
  svg.appendChild(chatBoxes);

  // Dot layer on top
  svg.appendChild(svgEl('g', {id:'dot-layer'}));
}

/* ── SVG helpers ─────────────────────────────────────────────────── */
function svgEl(tag, attrs={}) {
  const el = document.createElementNS('http://www.w3.org/2000/svg', tag);
  for (const [k,v] of Object.entries(attrs)) el.setAttribute(k, v);
  return el;
}
function svgText(x, y, text, size=12, fill='#ddd') {
  const el = svgEl('text', {x, y, 'text-anchor':'middle', 'dominant-baseline':'middle',
    'font-family':'Courier New, monospace', 'font-size':size, fill});
  const lines = text.split('\n');
  if (lines.length === 1) { el.textContent = text; }
  else { lines.forEach((l,i)=>{ const ts=svgEl('tspan',{x,dy:i===0?0:13}); ts.textContent=l; el.appendChild(ts); }); }
  return el;
}
function drawCurve(parent, x1, y1, x2, y2, color='#1e2a44') {
  const my = (y1+y2)/2;
  const path = svgEl('path', {
    d: `M ${x1} ${y1} C ${x1} ${my}, ${x2} ${my}, ${x2} ${y2}`,
    stroke: color, 'stroke-width': 1, fill: 'none', 'marker-end': 'url(#arrow)'
  });
  parent.appendChild(path);
}
function drawStorage(parent, x, y, id, label, fill, stroke) {
  const g = svgEl('g', {id:`node-${id}`});
  // cylinder body
  g.appendChild(svgEl('rect', {x:x-46, y:y-22, width:92, height:44, rx:5, fill, stroke, 'stroke-width':1.2}));
  // cylinder top ellipse
  g.appendChild(svgEl('ellipse', {cx:x, cy:y-22, rx:46, ry:7, fill, stroke, 'stroke-width':1.2}));
  g.appendChild(svgText(x, y+2, label, 9, stroke));
  parent.appendChild(g);
}
function addGrad(defs, id, c1, c2) {
  const g = svgEl('linearGradient', {id, x1:'0', y1:'0', x2:'0', y2:'1'});
  const s1 = svgEl('stop', {offset:'0%'}); s1.setAttribute('stop-color', c1);
  const s2 = svgEl('stop', {offset:'100%'}); s2.setAttribute('stop-color', c2);
  g.appendChild(s1); g.appendChild(s2); defs.appendChild(g);
}

/* ── Highlight ───────────────────────────────────────────────────── */
function highlightNode(id, cls='pulse') {
  const g = document.getElementById(id);
  if (!g) return;
  g.classList.remove('pulse','pulse-green');
  void g.offsetWidth;
  g.classList.add(cls);
  setTimeout(()=>g.classList.remove(cls), 650);
}

/* ── Travelling dot ──────────────────────────────────────────────── */
function travelDot(x1, y1, x2, y2, color, ms) {
  return new Promise(resolve => {
    const layer = document.getElementById('dot-layer');
    const dot   = svgEl('circle', {cx:x1, cy:y1, r:4, fill:color});
    // add glow via inner smaller circle
    const glow  = svgEl('circle', {cx:x1, cy:y1, r:6, fill:color, opacity:'0.25'});
    layer.appendChild(glow);
    layer.appendChild(dot);
    const t0 = performance.now();
    function frame(now) {
      const t = Math.min((now-t0)/ms, 1);
      const ex = x1+(x2-x1)*t, ey = y1+(y2-y1)*t;
      dot.setAttribute('cx', ex); dot.setAttribute('cy', ey);
      glow.setAttribute('cx', ex); glow.setAttribute('cy', ey);
      if (t < 1) requestAnimationFrame(frame);
      else { dot.remove(); glow.remove(); resolve(); }
    }
    requestAnimationFrame(frame);
  });
}

/* ── Node centre (SVG coords) ────────────────────────────────────── */
function nodeCentre(id) {
  const el = document.getElementById(id);
  if (!el) return {x:0, y:0};
  const bb=el.getBoundingClientRect(), svgE=document.getElementById('diagram');
  const sb=svgE.getBoundingClientRect(), vb=svgE.viewBox.baseVal;
  const sx=vb.width/sb.width, sy=vb.height/sb.height;
  return { x:(bb.left+bb.width/2 -sb.left)*sx, y:(bb.top+bb.height/2-sb.top)*sy };
}

/* ================================================================
   CONTROLLER
   ================================================================ */
let world, steps, stepGen, running=false, done=false, autoTimer=null;

function getSpeed() { return parseInt(document.getElementById('speed').value); }

function init() {
  world   = buildWorld();
  buildDiagram(world);
  steps   = [];
  stepGen = makeSteps(world);
  done    = false;
  running = false;
  if (autoTimer) { clearTimeout(autoTimer); autoTimer=null; }
  document.getElementById('btn-run').disabled  = false;
  document.getElementById('btn-step').disabled = false;
  document.getElementById('step-label').textContent = '—';
}

async function processStep() {
  if (done) return;
  const r = stepGen.next();
  if (r.done || r.value?.type === 'done') {
    done=true;
    document.getElementById('step-label').textContent='done';
    document.getElementById('btn-run').disabled=true;
    document.getElementById('btn-step').disabled=true;
    return;
  }
  steps.push(r.value);
  document.getElementById('step-label').textContent=`step ${steps.length}`;
  await animateStep(r.value);
}

async function animateStep(step) {
  const ms = Math.min(getSpeed()*0.6, 420);

  switch (step.type) {
    case 'msg-start':
      highlightNode(`node-api-${step.chatId}`);
      break;

    case 'query-chat-user': {
      const f=nodeCentre(`node-api-${step.chatId}`), t=nodeCentre('node-chat-user-storage');
      await travelDot(f.x,f.y, t.x,t.y, '#c87820', ms);
      highlightNode('node-chat-user-storage');
      break;
    }

    case 'query-user-gw-batch': {
      // scatter-gather: all 4 dots fire at once
      const f=nodeCentre(`node-api-${step.chatId}`), t=nodeCentre('node-user-gw-storage');
      await Promise.all(step.userGWPairs.map(()=>travelDot(f.x,f.y, t.x,t.y, '#3ea844', ms)));
      highlightNode('node-user-gw-storage');
      break;
    }

    case 'route-to-gw-batch': {
      // fanout: all GW dots at once
      const f=nodeCentre(`node-api-${step.chatId}`);
      await Promise.all(step.gwTargets.map(({gwId})=>{
        const t=nodeCentre(`node-${gwId}`);
        return travelDot(f.x,f.y, t.x,t.y, '#5599ee', ms);
      }));
      step.gwTargets.forEach(({gwId})=>highlightNode(`node-${gwId}`));
      break;
    }

    case 'deliver-batch': {
      // all GW → user deliveries fire simultaneously
      await Promise.all(step.delivers.map(({gwId, userId, socketId}) => {
        const f=nodeCentre(`node-${gwId}`), t=nodeCentre(`node-user-${userId}`);
        return travelDot(f.x,f.y, t.x,t.y, '#55dd99', ms).then(()=>{
          highlightNode(`node-user-${userId}`, 'pulse-green');
          world.users[userId].delivered++;
          const sub=document.querySelector(`#node-user-${userId} text:last-child`);
          if (sub) sub.textContent=`${socketId} ✓`;
        });
      }));
      break;
    }
  }
}

function scheduleNext() {
  if (done||!running) return;
  autoTimer=setTimeout(async()=>{ await processStep(); scheduleNext(); }, getSpeed());
}

document.getElementById('btn-run').addEventListener('click', ()=>{
  if (running) {
    running=false; if(autoTimer){clearTimeout(autoTimer);autoTimer=null;}
    document.getElementById('btn-run').textContent='▶ Run';
    document.getElementById('btn-step').disabled=false;
  } else {
    running=true;
    document.getElementById('btn-run').textContent='⏸ Pause';
    document.getElementById('btn-step').disabled=true;
    scheduleNext();
  }
});
document.getElementById('btn-step').addEventListener('click', async()=>{
  if(running||done) return;
  document.getElementById('btn-step').disabled=true;
  await processStep();
  if(!done) document.getElementById('btn-step').disabled=false;
});
document.getElementById('btn-reset').addEventListener('click', ()=>{
  running=false; if(autoTimer){clearTimeout(autoTimer);autoTimer=null;}
  document.getElementById('btn-run').textContent='▶ Run';
  init();
});

init();
</script>
